name: NPM Publish
on: push
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: yarn
      - run: npm run script publish.prepare
      - uses: JS-DevTools/npm-publish@v4
        with:
          package: ./dist/package.json
